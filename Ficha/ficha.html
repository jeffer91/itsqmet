<!-- =========================================================
     ARCHIVO: ficha.html
     Pantalla final de Ficha de estudiante
     - Buscador predictivo por cédula, nombre o apellido
     - Filtro opcional por periodo (arriba)
     - Detalle del estudiante con requisitos y tipo de titulación
     ========================================================= -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ficha de estudiante</title>
  <link rel="stylesheet" href="ficha.css" />
</head>
<body>
  <main class="ficha-page">
    <header class="ficha-header">
      <h1 class="ficha-title">Ficha de estudiante</h1>
      <p class="ficha-subtitle">
        Consulta rápida de información del estudiante y de sus requisitos de titulación.
      </p>
    </header>

    <section class="ficha-layout">
      <!-- Panel izquierdo: Buscador -->
      <article class="ficha-card ficha-card--search">
        <h2 class="ficha-card-title">Buscador</h2>
        <p class="ficha-card-desc">
          Escribe la cédula, el nombre o el apellido del estudiante.
        </p>

        <!-- Filtro opcional por periodo -->
        <div class="ficha-filter-row">
          <label class="ficha-filter-label" for="ficha-period-filter">Periodo (opcional)</label>
          <select id="ficha-period-filter" class="ficha-filter-select">
            <option value="">Todos los periodos</option>
          </select>
        </div>

        <div class="ficha-search-input-row">
          <span class="ficha-search-icon">🔍</span>
          <input
            id="ficha-search-input"
            class="ficha-search-input"
            type="text"
            placeholder="Escribe para buscar…"
            autocomplete="off"
          />
          <button id="ficha-search-clear" class="ficha-btn-secondary" type="button">
            Limpiar
          </button>
        </div>

        <p id="ficha-search-status" class="ficha-search-status">
          Cargando estudiantes desde la base de datos…
        </p>

        <ul id="ficha-search-results" class="ficha-search-list"></ul>
      </article>

      <!-- Panel derecho: Detalle -->
      <article class="ficha-card ficha-card--detail">
        <h2 class="ficha-card-title">Detalle del estudiante</h2>
        <div id="ficha-detail" class="ficha-detail">
          <p class="ficha-detail-empty">
            Seleccione un estudiante para ver su ficha.
          </p>
        </div>
      </article>
    </section>
  </main>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- Inicialización Firebase y acceso a datos -->
  <script src="ficha-firebase-init.js"></script>
  <script src="ficha-data-remote.js"></script>

  <!-- Lógica de tipo de titulación y guardado remoto -->
  <script src="ficha-tipo-logic.js"></script>
  <script src="ficha-tipo-remote.js"></script>

  <!-- Observaciones remoto -->
  <script src="ficha-observ-remote.js"></script>

  <!-- Buscador, UI y app -->
  <script src="ficha-search-logic.js"></script>
  <script src="ficha-ui.js"></script>
  <script src="ficha-app.js"></script>
</body>
</html>
