<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Cronogramas</title>
  
  <link rel="stylesheet" href="cronograma.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

  <div class="crono-container">
    
    <header class="crono-header">
      <div>
        <h1>Generador de Cronogramas</h1>
        <p>Planificación académica basada en plantillas y feriados oficiales.</p>
      </div>
      <div class="crono-actions">
        <button id="btn-save" class="crono-btn btn-primary"><i class="fas fa-cloud-upload-alt"></i> Guardar Cronograma</button>
      </div>
    </header>

    <section class="crono-config-panel">
      
      <div class="crono-input-group">
        <label>1. Período Académico</label>
        <select id="sel-periodo" class="crono-select">
          <option value="">Cargando periodos...</option>
        </select>
      </div>

      <div class="crono-input-group">
        <label>2. Tipo de Proceso</label>
        <select id="sel-tipo" class="crono-select">
          <option value="">Cargando plantillas...</option>
        </select>
      </div>

      <div class="crono-input-group">
        <label>3. Fecha de Finalización de Clases</label>
        <input type="date" id="date-inicio" class="crono-date-input">
      </div>

      <div class="crono-input-group last">
        <button id="btn-generar" class="crono-btn btn-success">
          <i class="fas fa-magic"></i> Generar
        </button>
      </div>

    </section>

    <section id="crono-stats" class="crono-stats-grid" style="display: none;">
      </section>

    <section class="crono-results">
      <div class="crono-toolbar">
        <h3>Vista Previa del Cronograma</h3>
        <div class="crono-export-tools">
          <button onclick="window.CronoUI.export('pdf')" class="crono-btn-sm" title="PDF"><i class="fas fa-file-pdf"></i></button>
          <button onclick="window.CronoUI.export('excel')" class="crono-btn-sm" title="Excel"><i class="fas fa-file-excel"></i></button>
          <button onclick="window.CronoUI.export('image')" class="crono-btn-sm" title="Imagen"><i class="fas fa-image"></i></button>
        </div>
      </div>

      <div id="crono-table-wrapper" class="crono-table-wrapper">
        <table id="crono-table" class="crono-table">
          <thead>
            <tr>
              <th width="50">#</th>
              <th>Actividad</th>
              <th width="100">Duración</th>
              <th width="150">Inicio</th>
              <th width="150">Fin</th>
              <th>Observaciones / Impacto</th>
            </tr>
          </thead>
          <tbody id="crono-tbody">
            <tr>
              <td colspan="6" class="text-center">Configura los parámetros y pulsa "Generar"</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

  <script src="crono-bus.js"></script>
  <script src="crono-logic.js"></script>

  <script src="crono-main.js"></script>

</body>
</html>
