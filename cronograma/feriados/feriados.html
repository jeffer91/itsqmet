<!-- Archivo: feriados.html -->
<!-- Función: Vista del módulo Feriados y carga del entrypoint feriados-init.js -->

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Gestor de Feriados · Ecuador</title>
    <link rel="stylesheet" href="feriados.css" />
  </head>

  <body>
    <main class="screen">
      <section class="screen-header">
        <h1>Feriados de Ecuador</h1>
        <p class="muted">
          Importa feriados por año, agrega manuales y se guardan en Firestore. Se actualiza solo cuando hay cambios.
        </p>
      </section>

      <section class="feriados-panel">
        <!-- Barra superior del panel -->
        <div class="feriados-header">
          <div class="feriados-year-block">
            <label class="field-label">Año</label>

            <div class="year-row">
              <button id="feriados-anio-prev" type="button" class="btn btn-light" title="Año anterior" aria-label="Año anterior">
                ◀
              </button>

              <div id="feriados-anio-label" class="year-label" aria-live="polite">----</div>

              <button id="feriados-anio-next" type="button" class="btn btn-light" title="Año siguiente" aria-label="Año siguiente">
                ▶
              </button>
            </div>
          </div>

          <div class="feriados-actions-block">
            <label class="field-label">Acciones rápidas</label>
            <div class="actions-row">
              <button id="feriados-importar" class="btn btn-primary" type="button">
                Importar desde Internet (Ecuador)
              </button>

              <button id="feriados-guardar" class="btn btn-secondary" type="button" title="Guardar manualmente">
                Guardar
              </button>

              <button id="feriados-eliminar-anio" class="btn btn-danger" type="button">
                Vaciar año (dejar sin feriados)
              </button>
            </div>
          </div>
        </div>

        <!-- Estado -->
        <div id="feriados-status" class="status status--idle" aria-live="polite">
          Listo.
        </div>

        <!-- Agregar/editar -->
        <div class="feriados-add">
          <div class="add-field">
            <label for="feriados-fecha-nueva" class="field-label">Fecha (YYYY-MM-DD)</label>
            <input id="feriados-fecha-nueva" class="input" placeholder="2026-08-10" />
          </div>

          <div class="add-field">
            <label for="feriados-nombre-nuevo" class="field-label">Nombre</label>
            <input id="feriados-nombre-nuevo" class="input" placeholder="Ej: Primer Grito de Independencia" />
          </div>

          <div class="add-field add-field--button">
            <button id="feriados-agregar" class="btn btn-secondary" type="button">
              Agregar / Actualizar
            </button>
          </div>
        </div>

        <!-- Tabla -->
        <div class="feriados-table">
          <table class="table">
            <thead>
              <tr>
                <th style="width: 130px">Fecha</th>
                <th>Nombre del feriado</th>
                <th style="width: 90px">Acciones</th>
              </tr>
            </thead>
            <tbody id="feriados-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="./feriados-init.js"></script>
  </body>
</html>
