<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard UTET | Generador de Reportes</title>

  <link rel="stylesheet" href="repo_estilos.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <!-- ✅ CORRECCIÓN: requerido en muchos entornos para jspdf.html(...) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="app-layout">

  <aside class="sidebar">
    <div class="brand">
      <span class="material-icons-round">description</span>
      <div>
        <h1>UTET Reportes</h1>
        <small>Gestor de Procesos</small>
      </div>
    </div>

    <div class="control-group">
      <label class="group-label">Configuración General</label>

      <div class="input-row">
        <select id="selector-periodo" class="full-width">
          <option value="">Cargando periodos...</option>
        </select>
      </div>

      <div class="input-grid">
        <div>
          <label>N° Informe</label>
          <input type="number" id="cod-num" value="1" min="1">
        </div>
        <div>
          <label>Mes Reporte</label>
          <select id="cod-mes">
            <option value="01">Ene</option><option value="02">Feb</option>
            <option value="03">Mar</option><option value="04">Abr</option>
            <option value="05">May</option><option value="06">Jun</option>
            <option value="07">Jul</option><option value="08">Ago</option>
            <option value="09">Sep</option><option value="10">Oct</option>
            <option value="11">Nov</option><option value="12" selected>Dic</option>
          </select>
        </div>
        <div>
          <label>Año</label>
          <input type="number" id="cod-anio" value="2025">
        </div>
      </div>

      <!-- Fecha Tentativa Defensa eliminada por requerimiento -->

      <div class="toggle-row mt-10">
        <label for="check-titulacion">Incluir Titulación</label>
        <input type="checkbox" id="check-titulacion" checked>
      </div>
    </div>

    <div class="control-group">
      <label class="group-label">Evidencias y Anexos</label>

      <div id="dropzone" class="dropzone">
        <span class="material-icons-round icon-lg">cloud_upload</span>
        <p>Arrastra imágenes aquí o pega <strong>(Ctrl + V)</strong></p>
        <small>Clic para explorar archivos</small>
        <input type="file" id="anexo-file" accept="image/*" multiple hidden>
      </div>

      <div id="anexos-grid" class="anexos-grid"></div>
    </div>

    <div class="actions-footer">
      <div id="status-bar" class="status-text">Listo para empezar</div>
      <div class="btn-group">
        <button id="btn-download-word" class="btn btn-primary" type="button">
          <span class="material-icons-round">file_download</span> Word
        </button>
        <button id="btn-download-pdf" class="btn btn-danger" type="button">
          <span class="material-icons-round">picture_as_pdf</span> PDF
        </button>
      </div>
    </div>
  </aside>

  <main class="viewer-area">
    <div class="viewer-toolbar">
      <div class="pagination">
        <button id="btn-prev-page" class="icon-btn" type="button">
          <span class="material-icons-round">chevron_left</span>
        </button>
        <span id="page-indicator">Página 1 / 1</span>
        <button id="btn-next-page" class="icon-btn" type="button">
          <span class="material-icons-round">chevron_right</span>
        </button>
      </div>

      <!-- ✅ Botones en barra superior -->
      <div class="toolbar-actions">
        <button id="btn-download-word-top" class="btn-toolbar" type="button" title="Descargar Word">
          <span class="material-icons-round">description</span> Word
        </button>
        <button id="btn-download-pdf-top" class="btn-toolbar" type="button" title="Descargar PDF">
          <span class="material-icons-round">picture_as_pdf</span> PDF
        </button>
      </div>

      <div id="loading-indicator" class="loader hidden">Generando vista previa...</div>
    </div>

    <div class="document-scroll">
      <div id="document-viewer" class="paper-canvas">
        <div class="placeholder-state">
          <span class="material-icons-round">preview</span>
          <p>Selecciona un periodo a la izquierda para ver el reporte.</p>
        </div>
      </div>
    </div>
  </main>

</div>

<script type="module" src="repo_app.js"></script>
</body>
</html>
